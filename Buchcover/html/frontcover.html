<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1800, height=2700">
    <title>KI mit Python - Frontcover</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="cover frontcover">
        <!-- Badge "Business Data Professional Media" -->

            <span class="badge-text">Business Data Professional Media</span>

        <!-- Hauptinhalt -->

            <!-- Unterer Bereich mit Trennlinie -->
            <div class="bottom-section">
                <!-- Autoren -->
                <div class="authors-section">
                    <p class="author-name">Prof. Dr. Paul Pronobis</p>
                    <p class="author-name">Tobias Lämmle</p>
                </div>

</html>
